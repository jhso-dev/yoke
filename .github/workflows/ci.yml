name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # test:main excludes the kuzu adapter — its native binding cannot run
      # inside a vitest pool. The kuzu-adapter job below covers it with the
      # standalone in-process runner (scripts/test-kuzu.mjs).
      - run: npm run test:main
      - run: npm run build

  kuzu-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:kuzu
